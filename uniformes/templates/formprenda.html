{% if mensaje %}
<div
  class="bg-green-100 text-green-800 p-2 rounded mb-4 text-center font-semibold"
>
  {{ mensaje }}
</div>
{% endif %}

<form method="POST" enctype="multipart/form-data" class="space-y-4"
      action="{% if prenda.idPrenda %}{% url 'editar_prenda' prenda.idPrenda %}{% else %}{% url 'crear_prenda' local.IdLocal %}{% endif %}">
  {% csrf_token %}

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="md:col-span-2">
      <label class="block text-sm font-bold text-gray-700 mb-1">Nombre del Uniforme</label>
      <input type="text" name="nombre"
         value="{{ prenda.nombre|default:'' }}"
         placeholder="Ej: Camisa Gala Sena"
         class="w-full p-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#125f58] focus:border-[#125f58] outline-none transition"
         required>
    </div>

    <div class="md:col-span-2">
      <label class="block text-sm font-bold text-gray-700 mb-1">Descripción</label>
      <textarea name="descripcion" id="descInput" rows="2" maxlength="500"
        class="w-full p-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#125f58] outline-none transition"
        placeholder="Detalles sobre tela, lavado, etc.">{{ prenda.descripcion|default:'' }}</textarea>
      <p id="charCount" class="text-right text-[10px] text-gray-400 mt-1 font-mono">0 / 500</p>
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-1">Imagen</label>
    <label
        class="block bg-gray-50 border-2 border-dashed border-gray-300 text-gray-500 text-center py-2 rounded-xl cursor-pointer hover:bg-gray-100 transition"
    >
        {% if prenda.idPrenda %}📷 Cambiar Imagen{% else %}📁 Subir Imagen{% endif %}
      <input type="file" name="imagen"
       accept="image/*"
       class="hidden"
       id="imagenInput"
       {% if not prenda %}required{% endif %}>
    </label>
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-1">Precio</label>
      <input type="number" name="precio" step="0.01"
         value="{{ prenda.precio|stringformat:'s'|default:'' }}"
         class="w-full p-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#125f58] outline-none" required>
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-1">Talla</label>
      <select name="talla" class="w-full p-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#125f58] outline-none" required>
        <option value="">Selecciona una talla</option>
        {% for val, label in prenda_talla_choices %}
          <option value="{{ val }}" {% if prenda.talla == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-1">Stock Disponible</label>
      <input type="number" name="stock"
         value="{{ prenda.stock|default:'' }}"
         class="w-full p-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#125f58] outline-none" required>
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-1">Material</label>
      <select name="material" class="w-full p-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#125f58] outline-none" required>
        <option value="">Selecciona un material</option>
        {% for val, label in prenda_material_choices %}
          <option value="{{ val }}" {% if prenda.material == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-bold text-gray-700 mb-1">Tipo de Prenda</label>
      <select name="tipoPrenda" class="w-full p-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#125f58] outline-none" required>
        <option value="">Selecciona tipo</option>
        {% for val, label in prenda_tipo_choices %}
          <option value="{{ val }}" {% if prenda.tipoPrenda == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="text-center">
    <img
      id="previewImagenCard"
      class="hidden mt-2 h-32 mx-auto rounded-lg object-cover"
    />
  </div>

  <!-- BOTONES -->
  <div class="flex gap-2">
    <button
      type="button"
      onclick="cancelarFormulario()"
      class="flex-1 bg-gray-300 py-2 rounded-lg hover:bg-gray-400 transition"
    >
      ❌ Cancelar
    </button>
    <button
      type="submit"
      class="flex-1 bg-[#125f58] text-white py-2 rounded-lg hover:bg-[#0d4742] transition"
    >
      💾 Guardar
    </button>
  </div>
</form>

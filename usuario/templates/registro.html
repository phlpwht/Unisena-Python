{% extends "base_auth.html" %}
{% block titulo %} Registro | UniSena {% endblock %}
{% block contenido %}

<h4 class="text-center mb-2">Crear cuenta</h4>

<style>
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
  .msj-bonito { transition: opacity 0.5s ease; }
</style>

<form method="POST">
  {% csrf_token %}
  
  <div class="row">
    <div class="col-md-6 mb-2">
      <label>Nombres</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="nombres" class="form-control" required pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+" maxlength="50" title="Solo se permiten letras y espacios, máx 50">
      </div>
    </div>
    <div class="col-md-6 mb-2">
      <label>Apellidos</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
        <input type="text" name="apellidos" class="form-control" required pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+" maxlength="50" title="Solo se permiten letras y espacios, máx 50">
      </div>
    </div>
  </div>

  <div class="mb-2">
    <label>Correo</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-envelope"></i></span>
      <input type="email" name="correo" class="form-control" required />
    </div>
  </div>

  <div class="mb-2">
    <label>Fecha nacimiento</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-calendar"></i></span>
      <input type="date" name="fecha_nacimiento" class="form-control" required />
    </div>
    <small id="errorFecha" class="text-danger font-bold"></small>
  </div>

  <div class="mb-2">
    <label>Tipo identificación</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-credit-card"></i></span>
      <select name="tipo_identificacion" id="tipo_id" class="form-control">
        <option value="CC">Cédula</option>
        <option value="TI">Tarjeta identidad</option>
        <option value="CE">Cédula extranjería</option>
      </select>
    </div>
  </div>

  <div class="mb-2">
    <label>Número identificación</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-hash"></i></span>
      <input type="text" name="num_identificacion" class="form-control" maxlength="15" required pattern="\d+" title="Solo se permiten números, máx 15" inputmode="numeric">
    </div>
  </div>

  <div class="mb-2">
    <label>Contraseña</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock"></i></span>
      <input type="password" name="password" id="password" class="form-control" required minlength="8" maxlength="20">
      <button type="button" class="btn btn-outline-secondary" onclick="verPassword()">
        <i class="bi bi-eye"></i>
      </button>
    </div>
    <div class="progress mt-2" style="height:8px;">
      <div id="barraSeguridad" class="progress-bar"></div>
    </div>
    <small id="textoSeguridad"></small>
  </div>

  <!-- ✅ MENSAJES FLOTANTES -->
  {% if messages %}
    <div id="mensaje-popup-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[100] pointer-events-none w-full max-w-md">
      {% for message in messages %}
        <div class="bg-white border-l-4 {% if message.tags == 'error' %}border-red-500 text-red-700{% else %}border-[#125f58] text-[#125f58]{% endif %} p-4 rounded-lg shadow-xl text-center font-bold pointer-events-auto mb-2 animate-fade-in text-sm uppercase tracking-tight">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <button class="btn btn-main w-100 text-white mb-2">Registrarse</button>

  <div class="text-center">
    ¿Ya tienes cuenta?
    <a href="{% url 'login' %}">Ya tengo cuenta</a>
  </div>
</form>

<script>
  function verPassword() {
    let input = document.getElementById("password");
    if (input.type === "password") {
      input.type = "text";
    } else {
      input.type = "password";
    }
  }

 let password = document.getElementById("password")
 let barra = document.getElementById("barraSeguridad")
 let texto = document.getElementById("textoSeguridad")

 password.addEventListener("keyup", function(){
 let valor = password.value
 let fuerza = 0
 if(valor.length >= 8) fuerza++
 if(/[A-Z]/.test(valor)) fuerza++
 if(/[0-9]/.test(valor)) fuerza++
 if(/[^A-Za-z0-9]/.test(valor)) fuerza++

 if(fuerza <= 1) {
 barra.style.width="25%"
 barra.className="progress-bar bg-danger"
 texto.innerHTML="Contraseña débil"
 }
 if(fuerza == 2) {
 barra.style.width="50%"
 barra.className="progress-bar bg-warning"
 texto.innerHTML="Contraseña media"
 }
 if(fuerza == 3) {
 barra.style.width="75%"
 barra.className="progress-bar bg-info"
 texto.innerHTML="Contraseña buena"
 }
 if(fuerza == 4) {
 barra.style.width="100%"
 barra.className="progress-bar bg-success"
 texto.innerHTML="Contraseña fuerte"
 }
 })

  // Seleccionamos el campo de fecha por su nombre o ID
  const inputFecha = document.querySelector('input[name="fecha_nacimiento"]');
  const errorFecha = document.getElementById("errorFecha");
  const selectTipoId = document.getElementById("tipo_id");

  function actualizarOpcionesId(fechaNac) {
    if (!fechaNac) return;
    const hoy = new Date();
    const cumple = new Date(fechaNac);
    let edad = hoy.getFullYear() - cumple.getFullYear();
    const m = hoy.getMonth() - cumple.getMonth();
    if (m < 0 || (m === 0 && hoy.getDate() < cumple.getDate())) {
      edad--;
    }

    // Guardamos la selección previa para intentar mantenerla si es válida
    const seleccionActual = selectTipoId.value;
    selectTipoId.innerHTML = "";

    if (edad >= 18) {
      selectTipoId.innerHTML = `<option value="CC" ${seleccionActual === 'CC' ? 'selected' : ''}>Cédula de ciudadanía</option>
                                <option value="CE" ${seleccionActual === 'CE' ? 'selected' : ''}>Cédula de extranjería</option>`;
    } else {
      selectTipoId.innerHTML = `<option value="TI" ${seleccionActual === 'TI' ? 'selected' : ''}>Tarjeta de identidad</option>
                                <option value="CE" ${seleccionActual === 'CE' ? 'selected' : ''}>Cédula de extranjería</option>`;
    }
  }

  if (inputFecha) {
    const hoy = new Date();
    
    // Calculamos la fecha máxima permitida (Hoy - 14 años para asegurar edad >= 14)
    const yyyy = hoy.getFullYear() - 14;
    const mm = String(hoy.getMonth() + 1).padStart(2, '0');
    const dd = String(hoy.getDate()).padStart(2, '0');
    const fechaMax = `${yyyy}-${mm}-${dd}`;

    // Calculamos la fecha mínima (Hace 70 años, para coincidir con tu validación en views.py)
    // Si prefieres 60 años, simplemente cambia el 70 por 60
    const fechaMin = `${yyyy - 70}-${mm}-${dd}`;

    // Aplicamos los atributos al input
    inputFecha.setAttribute("max", fechaMax);
    inputFecha.setAttribute("min", fechaMin);
    
    inputFecha.addEventListener('change', function() {
      if (this.value > fechaMax) {
        errorFecha.innerHTML = "🔞 Debes tener al menos 14 años para registrarte.";
      } else if (this.value < fechaMin) {
        errorFecha.innerHTML = "⚠️ El límite de edad es de 70 años.";
      } else {
        errorFecha.innerHTML = "";
        actualizarOpcionesId(this.value);
      }
    });
  }

  // 🔥 Ocultar mensajes después de 3 segundos
  setTimeout(() => {
    const container = document.getElementById('mensaje-popup-container');
    if(container) {
      container.style.transition = "opacity 0.5s ease, transform 0.5s ease";
      container.style.opacity = '0';
      container.style.transform = 'translate(-50%, -20px)';
      setTimeout(() => container.remove(), 500);
    }
  }, 3000);

</script>

{% endblock %}
